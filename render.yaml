# Render Blueprint — free web service for the FastAPI backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flight-delay-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.5"
